services:
  postgres:
    image: postgres:16-alpine
    container_name: snowpanel-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-snowpanel}
      POSTGRES_USER: ${POSTGRES_USER:-snowpanel}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-snowpanel}
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-snowpanel} -d ${POSTGRES_DB:-snowpanel}"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations/0001_init_schema.up.sql:/docker-entrypoint-initdb.d/0001_init_schema.sql:ro

  redis:
    image: redis:7-alpine
    container_name: snowpanel-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - redis_data:/data

  core-agent:
    build:
      context: .
      dockerfile: core-agent/Dockerfile
    container_name: snowpanel-core-agent
    restart: unless-stopped
    environment:
      CORE_AGENT_HOST: 0.0.0.0
      CORE_AGENT_PORT: ${CORE_AGENT_PORT:-50051}
      CORE_AGENT_ALLOWED_ROOTS: ${CORE_AGENT_ALLOWED_ROOTS:-/tmp,/var/tmp,/home,/workspace}
      CORE_AGENT_MAX_READ_BYTES: ${CORE_AGENT_MAX_READ_BYTES:-1048576}
      CORE_AGENT_MAX_WRITE_BYTES: ${CORE_AGENT_MAX_WRITE_BYTES:-1048576}
      CORE_AGENT_SERVICE_WHITELIST: ${CORE_AGENT_SERVICE_WHITELIST:-nginx.service,sshd.service,docker.service}
      CORE_AGENT_CRON_ALLOWED_COMMANDS: ${CORE_AGENT_CRON_ALLOWED_COMMANDS:-backup,logrotate,cleanup}
    expose:
      - "50051"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: snowpanel-backend
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV:-development}
      BACKEND_HOST: 0.0.0.0
      BACKEND_PORT: ${BACKEND_PORT:-8080}
      BACKEND_READ_TIMEOUT: ${BACKEND_READ_TIMEOUT:-5s}
      BACKEND_WRITE_TIMEOUT: ${BACKEND_WRITE_TIMEOUT:-10s}
      AGENT_TARGET: core-agent:${CORE_AGENT_PORT:-50051}
      AGENT_TIMEOUT: ${AGENT_TIMEOUT:-3s}
      JWT_SECRET: ${JWT_SECRET:-}
      JWT_ISSUER: ${JWT_ISSUER:-snowpanel-backend}
      JWT_EXPIRE: ${JWT_EXPIRE:-24h}
      JWT_REFRESH_EXPIRE: ${JWT_REFRESH_EXPIRE:-168h}
      LOGIN_ATTEMPT_STORE: ${LOGIN_ATTEMPT_STORE:-memory}
      LOGIN_ATTEMPT_REDIS_PREFIX: ${LOGIN_ATTEMPT_REDIS_PREFIX:-snowpanel:auth:attempt}
      LOGIN_MAX_FAILURES: ${LOGIN_MAX_FAILURES:-5}
      LOGIN_FAILURE_WINDOW: ${LOGIN_FAILURE_WINDOW:-15m}
      LOGIN_LOCK_DURATION: ${LOGIN_LOCK_DURATION:-15m}
      BOOTSTRAP_ADMIN: ${BOOTSTRAP_ADMIN:-true}
      DEFAULT_ADMIN_USERNAME: ${DEFAULT_ADMIN_USERNAME:-admin}
      DEFAULT_ADMIN_EMAIL: ${DEFAULT_ADMIN_EMAIL:-admin@snowpanel.local}
      DEFAULT_ADMIN_PASSWORD: ${DEFAULT_ADMIN_PASSWORD:-}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-snowpanel}
      POSTGRES_USER: ${POSTGRES_USER:-snowpanel}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-snowpanel}
      POSTGRES_SSLMODE: ${POSTGRES_SSLMODE:-disable}
      POSTGRES_TIMEZONE: ${POSTGRES_TIMEZONE:-UTC}
      POSTGRES_MAX_OPEN_CONNS: ${POSTGRES_MAX_OPEN_CONNS:-20}
      POSTGRES_MAX_IDLE_CONNS: ${POSTGRES_MAX_IDLE_CONNS:-5}
      POSTGRES_CONN_MAX_LIFETIME: ${POSTGRES_CONN_MAX_LIFETIME:-30m}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_DB: ${REDIS_DB:-0}
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      core-agent:
        condition: service_started

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: snowpanel-frontend
    restart: unless-stopped
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://127.0.0.1:8080}
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    depends_on:
      backend:
        condition: service_started

volumes:
  postgres_data:
  redis_data:
