services:
  postgres:
    image: postgres:16-alpine
    container_name: snowpanel-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-snowpanel}
      POSTGRES_USER: ${POSTGRES_USER:-snowpanel}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-snowpanel}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: snowpanel-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
