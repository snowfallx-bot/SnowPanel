syntax = "proto3";

package snowpanel.agent.v1;

option go_package = "github.com/snowfallx-bot/SnowPanel/proto/agent/v1;agentv1";

message Error {
  int32 code = 1;
  string message = 2;
  string detail = 3;
}

message HealthCheckRequest {}

message HealthCheckResponse {
  Error error = 1;
  string status = 2;
}

message PathSafetyContext {
  string requested_path = 1;
  repeated string allowed_roots = 2;
  bool enforce_safe_root = 3;
  bool follow_symlink = 4;
  string normalized_path = 5;
}

message GetSystemOverviewRequest {}

message CPUInfo {
  string model = 1;
  uint32 logical_cores = 2;
  double usage_percent = 3;
}

message MemoryInfo {
  uint64 total_bytes = 1;
  uint64 used_bytes = 2;
  double usage_percent = 3;
}

message DiskInfo {
  string mount_point = 1;
  uint64 total_bytes = 2;
  uint64 used_bytes = 3;
  double usage_percent = 4;
}

message SystemOverview {
  string hostname = 1;
  string os = 2;
  string kernel = 3;
  string uptime = 4;
  CPUInfo cpu = 5;
  MemoryInfo memory = 6;
  repeated DiskInfo disks = 7;
}

message GetSystemOverviewResponse {
  Error error = 1;
  SystemOverview overview = 2;
}

message GetRealtimeResourceRequest {}

message RealtimeResource {
  double cpu_usage_percent = 1;
  double memory_usage_percent = 2;
  double disk_usage_percent = 3;
  double load_average_1m = 4;
  double load_average_5m = 5;
  double load_average_15m = 6;
}

message GetRealtimeResourceResponse {
  Error error = 1;
  RealtimeResource resource = 2;
}

message FileEntry {
  string name = 1;
  string path = 2;
  bool is_dir = 3;
  uint64 size = 4;
  int64 modified_at_unix = 5;
}

message ListFilesRequest {
  string path = 1;
  PathSafetyContext safety = 2;
}

message ListFilesResponse {
  Error error = 1;
  string current_path = 2;
  repeated FileEntry entries = 3;
}

message ReadTextFileRequest {
  string path = 1;
  int64 max_bytes = 2;
  string encoding = 3;
  PathSafetyContext safety = 4;
}

message ReadTextFileResponse {
  Error error = 1;
  string path = 2;
  string content = 3;
  uint64 size = 4;
  bool truncated = 5;
  string encoding = 6;
}

message WriteTextFileRequest {
  string path = 1;
  string content = 2;
  bool create_if_not_exists = 3;
  bool truncate = 4;
  string encoding = 5;
  PathSafetyContext safety = 6;
}

message WriteTextFileResponse {
  Error error = 1;
  string path = 2;
  uint64 written_bytes = 3;
}

message CreateDirectoryRequest {
  string path = 1;
  bool create_parents = 2;
  PathSafetyContext safety = 3;
}

message CreateDirectoryResponse {
  Error error = 1;
  string path = 2;
}

message DeleteFileRequest {
  string path = 1;
  bool recursive = 2;
  PathSafetyContext safety = 3;
}

message DeleteFileResponse {
  Error error = 1;
  string path = 2;
}

message ServiceInfo {
  string name = 1;
  string display_name = 2;
  string status = 3;
}

message ListServicesRequest {
  string keyword = 1;
}

message ListServicesResponse {
  Error error = 1;
  repeated ServiceInfo services = 2;
}

message ServiceActionRequest {
  string name = 1;
}

message ServiceActionResponse {
  Error error = 1;
  string name = 2;
  string status = 3;
}

message DockerContainerInfo {
  string id = 1;
  string name = 2;
  string image = 3;
  string state = 4;
  string status = 5;
}

message ListDockerContainersRequest {}

message ListDockerContainersResponse {
  Error error = 1;
  repeated DockerContainerInfo containers = 2;
}

message DockerContainerActionRequest {
  string id = 1;
}

message DockerContainerActionResponse {
  Error error = 1;
  string id = 2;
  string state = 3;
}

message DockerImageInfo {
  string id = 1;
  repeated string repo_tags = 2;
  uint64 size = 3;
}

message ListDockerImagesRequest {}

message ListDockerImagesResponse {
  Error error = 1;
  repeated DockerImageInfo images = 2;
}

message CronTask {
  string id = 1;
  string expression = 2;
  string command = 3;
  bool enabled = 4;
}

message ListCronTasksRequest {
  string owner = 1;
}

message ListCronTasksResponse {
  Error error = 1;
  repeated CronTask tasks = 2;
}

service SystemService {
  rpc GetSystemOverview(GetSystemOverviewRequest) returns (GetSystemOverviewResponse);
  rpc GetRealtimeResource(GetRealtimeResourceRequest) returns (GetRealtimeResourceResponse);
}

service HealthService {
  rpc Check(HealthCheckRequest) returns (HealthCheckResponse);
}

service FileService {
  rpc ListFiles(ListFilesRequest) returns (ListFilesResponse);
  rpc ReadTextFile(ReadTextFileRequest) returns (ReadTextFileResponse);
  rpc WriteTextFile(WriteTextFileRequest) returns (WriteTextFileResponse);
  rpc CreateDirectory(CreateDirectoryRequest) returns (CreateDirectoryResponse);
  rpc DeleteFile(DeleteFileRequest) returns (DeleteFileResponse);
}

service ServiceManagerService {
  rpc ListServices(ListServicesRequest) returns (ListServicesResponse);
  rpc StartService(ServiceActionRequest) returns (ServiceActionResponse);
  rpc StopService(ServiceActionRequest) returns (ServiceActionResponse);
  rpc RestartService(ServiceActionRequest) returns (ServiceActionResponse);
}

service DockerService {
  rpc ListContainers(ListDockerContainersRequest) returns (ListDockerContainersResponse);
  rpc StartContainer(DockerContainerActionRequest) returns (DockerContainerActionResponse);
  rpc StopContainer(DockerContainerActionRequest) returns (DockerContainerActionResponse);
  rpc RestartContainer(DockerContainerActionRequest) returns (DockerContainerActionResponse);
  rpc ListImages(ListDockerImagesRequest) returns (ListDockerImagesResponse);
}

service CronService {
  rpc ListCronTasks(ListCronTasksRequest) returns (ListCronTasksResponse);
}
