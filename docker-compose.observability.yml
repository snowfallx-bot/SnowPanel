services:
  backend:
    environment:
      OTEL_TRACING_ENABLED: ${OTEL_TRACING_ENABLED:-true}
      OTEL_SERVICE_NAME: ${BACKEND_OTEL_SERVICE_NAME:-snowpanel-backend}
      OTEL_SERVICE_VERSION: ${OTEL_SERVICE_VERSION:-}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-otel-collector:4317}
      OTEL_EXPORTER_OTLP_INSECURE: ${OTEL_EXPORTER_OTLP_INSECURE:-true}
      OTEL_TRACES_SAMPLER_ARG: ${OTEL_TRACES_SAMPLER_ARG:-1.0}
    depends_on:
      otel-collector:
        condition: service_started

  core-agent:
    environment:
      OTEL_TRACING_ENABLED: ${OTEL_TRACING_ENABLED:-true}
      OTEL_SERVICE_NAME: ${CORE_AGENT_OTEL_SERVICE_NAME:-snowpanel-core-agent}
      OTEL_SERVICE_VERSION: ${OTEL_SERVICE_VERSION:-}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-otel-collector:4317}
      OTEL_EXPORTER_OTLP_INSECURE: ${OTEL_EXPORTER_OTLP_INSECURE:-true}
      OTEL_TRACES_SAMPLER_ARG: ${OTEL_TRACES_SAMPLER_ARG:-1.0}
    depends_on:
      otel-collector:
        condition: service_started

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: snowpanel-prometheus
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=15d
      - --web.enable-lifecycle
    volumes:
      - ./deploy/observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./deploy/observability/prometheus/alerts:/etc/prometheus/alerts:ro
      - prometheus_data:/prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      backend:
        condition: service_started
      alertmanager:
        condition: service_started
      otel-collector:
        condition: service_started

  alertmanager:
    image: prom/alertmanager:v0.28.1
    container_name: snowpanel-alertmanager
    restart: unless-stopped
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --storage.path=/alertmanager
    volumes:
      - ./deploy/observability/alertmanager/${ALERTMANAGER_CONFIG_FILE:-alertmanager.yml}:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    ports:
      - "${ALERTMANAGER_PORT:-9093}:9093"

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.115.1
    container_name: snowpanel-otel-collector
    restart: unless-stopped
    command:
      - --config=/etc/otelcol-contrib/config.yaml
    volumes:
      - ./deploy/observability/otel-collector/config.yaml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      - "${OTEL_COLLECTOR_GRPC_PORT:-4317}:4317"
      - "${OTEL_COLLECTOR_HTTP_PORT:-4318}:4318"
    depends_on:
      jaeger:
        condition: service_started

  jaeger:
    image: jaegertracing/all-in-one:1.62.0
    container_name: snowpanel-jaeger
    restart: unless-stopped
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "${JAEGER_UI_PORT:-16686}:16686"

volumes:
  prometheus_data:
  alertmanager_data:
