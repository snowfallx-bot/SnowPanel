name: Observability Smoke

on:
  workflow_dispatch:
    inputs:
      agent_mode:
        description: "Core-agent runtime mode"
        type: choice
        required: true
        default: container-agent
        options:
          - container-agent
          - host-agent
      host_agent_target:
        description: "Backend AGENT_TARGET when agent_mode=host-agent"
        type: string
        required: false
        default: host.docker.internal:50051

permissions:
  contents: read

jobs:
  observability-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      HOST_AGENT_LOG_DIR: .github/workflow-logs
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust (Host-Agent Mode)
        if: ${{ inputs.agent_mode == 'host-agent' }}
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Build Core-Agent (Host-Agent Mode)
        if: ${{ inputs.agent_mode == 'host-agent' }}
        working-directory: core-agent
        run: cargo build --release

      - name: Start Core-Agent On Host
        if: ${{ inputs.agent_mode == 'host-agent' }}
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $logDir = Join-Path $PWD $env:HOST_AGENT_LOG_DIR
          New-Item -ItemType Directory -Force -Path $logDir | Out-Null
          $stdoutLog = Join-Path $logDir "host-agent.stdout.log"
          $stderrLog = Join-Path $logDir "host-agent.stderr.log"
          $agentBinary = Join-Path $PWD "core-agent/target/release/core-agent"

          if (-not (Test-Path -LiteralPath $agentBinary)) {
            throw "core-agent binary not found at $agentBinary"
          }

          $agentEnv = @{
            APP_ENV                      = "production"
            CORE_AGENT_HOST              = "0.0.0.0"
            CORE_AGENT_PORT              = "50051"
            CORE_AGENT_METRICS_ENABLED   = "true"
            CORE_AGENT_METRICS_HOST      = "127.0.0.1"
            CORE_AGENT_METRICS_PORT      = "9108"
            OTEL_TRACING_ENABLED         = "true"
            OTEL_SERVICE_NAME            = "snowpanel-core-agent"
            OTEL_EXPORTER_OTLP_ENDPOINT  = "127.0.0.1:4317"
            OTEL_EXPORTER_OTLP_INSECURE  = "true"
            OTEL_TRACES_SAMPLER_ARG      = "1.0"
          }

          foreach ($pair in $agentEnv.GetEnumerator()) {
            [System.Environment]::SetEnvironmentVariable($pair.Key, $pair.Value, "Process")
          }

          $proc = Start-Process -FilePath $agentBinary -WorkingDirectory $PWD -RedirectStandardOutput $stdoutLog -RedirectStandardError $stderrLog -PassThru
          "HOST_AGENT_PID=$($proc.Id)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Host "Started host core-agent process with PID $($proc.Id)."

          $started = $false
          for ($attempt = 1; $attempt -le 40; $attempt++) {
            $proc.Refresh()
            if ($proc.HasExited) {
              throw "core-agent exited unexpectedly with code $($proc.ExitCode)."
            }

            $client = [System.Net.Sockets.TcpClient]::new()
            try {
              $task = $client.ConnectAsync("127.0.0.1", 50051)
              if ($task.Wait(500) -and $client.Connected) {
                $started = $true
                break
              }
            } catch {
            } finally {
              $client.Dispose()
            }

            Start-Sleep -Milliseconds 500
          }

          if (-not $started) {
            throw "core-agent did not bind to 127.0.0.1:50051 within timeout."
          }

      - name: Validate Observability Configs
        shell: pwsh
        run: ./scripts/observability/validate-config.ps1

      - name: Run Observability Smoke Test
        shell: pwsh
        run: ./scripts/ci/observability-smoke.ps1 -AgentMode "${{ inputs.agent_mode }}" -HostAgentTarget "${{ inputs.host_agent_target }}"

      - name: Stop Core-Agent On Host
        if: ${{ always() && inputs.agent_mode == 'host-agent' }}
        shell: pwsh
        run: |
          $ErrorActionPreference = "Continue"
          if ([string]::IsNullOrWhiteSpace($env:HOST_AGENT_PID)) {
            Write-Host "HOST_AGENT_PID is empty; skipping host core-agent shutdown."
            exit 0
          }
          try {
            Stop-Process -Id [int]$env:HOST_AGENT_PID -Force
          } catch {
            Write-Warning "Failed to stop host core-agent process: $($_.Exception.Message)"
          }

      - name: Upload Host-Agent Logs
        if: ${{ failure() && inputs.agent_mode == 'host-agent' }}
        uses: actions/upload-artifact@v4
        with:
          name: host-agent-logs
          path: .github/workflow-logs
          if-no-files-found: ignore
