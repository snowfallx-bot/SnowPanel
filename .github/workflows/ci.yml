name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25.x"
          cache: true
          cache-dependency-path: backend/go.sum

      - name: Run Backend Tests
        working-directory: backend
        run: go test ./...

  core-agent:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: rustfmt

      - name: Cache Rust Artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: core-agent

      - name: Check Formatting
        working-directory: core-agent
        run: cargo fmt --all -- --check

      - name: Run Core-Agent Tests
        working-directory: core-agent
        run: cargo test

  frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        working-directory: frontend
        run: npm ci

      - name: Run Frontend Tests
        working-directory: frontend
        run: npm run test

      - name: Build Frontend
        working-directory: frontend
        run: npm run build

  compose-smoke:
    runs-on: ubuntu-latest
    needs:
      - backend
      - core-agent
      - frontend
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run Compose Smoke Test
        shell: pwsh
        run: ./scripts/ci/compose-smoke.ps1
