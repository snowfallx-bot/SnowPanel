name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  observability-config:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate Observability Configs
        shell: pwsh
        run: ./scripts/observability/validate-config.ps1

  backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25.x"
          cache: true
          cache-dependency-path: backend/go.sum

      - name: Run Backend Tests
        working-directory: backend
        run: go test ./...

  core-agent:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: rustfmt

      - name: Cache Rust Artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: core-agent

      - name: Check Formatting
        working-directory: core-agent
        run: cargo fmt --all -- --check

      - name: Run Core-Agent Tests
        working-directory: core-agent
        run: cargo test

  frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        working-directory: frontend
        run: npm ci

      - name: Run Frontend Tests
        working-directory: frontend
        run: npm run test

      - name: Build Frontend
        working-directory: frontend
        run: npm run build

  proto-contract:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25.x"
          cache: true
          cache-dependency-path: backend/go.sum

      - name: Install Protoc
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Install Go Proto Generators
        working-directory: backend
        run: |
          GOBIN="$PWD/bin" go install google.golang.org/protobuf/cmd/protoc-gen-go@v1.36.1
          GOBIN="$PWD/bin" go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@v1.5.1

      - name: Regenerate Go Proto Bindings
        run: PATH="$PWD/backend/bin:$PATH" make proto-go

      - name: Verify Generated Proto Bindings Are Current
        run: |
          git diff --exit-code -I '^[[:space:]]*//[[:space:]]*(-[[:space:]]*)?protoc[[:space:]]+v' -- \
            backend/internal/grpcclient/pb/proto/agent/v1/agent.pb.go \
            backend/internal/grpcclient/pb/proto/agent/v1/agent_grpc.pb.go

  compose-smoke:
    runs-on: ubuntu-latest
    needs:
      - observability-config
      - backend
      - core-agent
      - frontend
      - proto-contract
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run Compose Smoke Test
        shell: pwsh
        run: ./scripts/ci/compose-smoke.ps1

  backend-integration:
    runs-on: ubuntu-latest
    needs:
      - compose-smoke
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run Backend Integration Test
        shell: pwsh
        run: ./scripts/ci/backend-integration.ps1

  observability-smoke-container:
    runs-on: ubuntu-latest
    needs:
      - compose-smoke
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run Observability Smoke (Container-Agent)
        shell: pwsh
        run: ./scripts/ci/observability-smoke.ps1 -AgentMode container-agent

      - name: Upload Observability Container Logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: observability-smoke-container-logs
          path: .github/workflow-logs/observability-smoke
          if-no-files-found: ignore

  observability-smoke-host-agent:
    runs-on: ubuntu-latest
    needs:
      - compose-smoke
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 55
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Build Core-Agent (Release)
        working-directory: core-agent
        run: cargo build --release

      - name: Start Host Core-Agent
        shell: pwsh
        run: ./scripts/ci/start-host-agent.ps1 -HostAgentTarget "host.docker.internal:50051" -HostAgentMetricsBaseUrl "http://127.0.0.1:9108" -LogDir ".github/workflow-logs"

      - name: Run Observability Smoke (Host-Agent)
        shell: pwsh
        run: ./scripts/ci/observability-smoke.ps1 -AgentMode host-agent -HostAgentTarget "host.docker.internal:50051" -HostAgentMetricsBaseUrl "http://127.0.0.1:9108"

      - name: Stop Host Core-Agent
        if: always()
        shell: pwsh
        run: ./scripts/ci/stop-host-agent.ps1

      - name: Upload Host-Agent Logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: observability-smoke-host-agent-logs
          path: .github/workflow-logs
          if-no-files-found: ignore

  frontend-e2e:
    runs-on: ubuntu-latest
    needs:
      - compose-smoke
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install Frontend Dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright Browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run Frontend E2E
        shell: pwsh
        run: ./scripts/ci/frontend-e2e.ps1

      - name: Upload Frontend E2E Artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-e2e-artifacts
          path: |
            frontend/playwright-report
            frontend/test-results
          if-no-files-found: ignore
