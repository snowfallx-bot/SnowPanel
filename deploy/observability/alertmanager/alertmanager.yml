global:
  resolve_timeout: 5m

route:
  receiver: snowpanel-warning
  group_by: ["alertname", "severity", "instance"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    - receiver: snowpanel-critical
      matchers:
        - severity="critical"
      group_wait: 10s
      group_interval: 2m
      repeat_interval: 30m
    - receiver: snowpanel-warning
      matchers:
        - severity="warning"
      group_wait: 30s
      group_interval: 10m
      repeat_interval: 4h

receivers:
  - name: snowpanel-warning
    # Baseline ships with a no-op warning receiver to keep startup predictable.
    # Configure your own warning channel here (webhook/email/slack/wechat/etc).
    #
    # Example:
    # webhook_configs:
    #   - url: "https://example.com/alert-webhook-warning"
    #     send_resolved: true

  - name: snowpanel-critical
    # Baseline ships with a no-op critical receiver to keep startup predictable.
    # Configure your own paging channel here (webhook/email/slack/wechat/etc).
    #
    # Example:
    # webhook_configs:
    #   - url: "https://example.com/alert-webhook-critical"
    #     send_resolved: true

inhibit_rules:
  - source_matchers:
      - severity="critical"
    target_matchers:
      - severity="warning"
    equal: ["alertname"]
