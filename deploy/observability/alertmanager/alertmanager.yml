global:
  resolve_timeout: 5m

route:
  receiver: snowpanel-null
  group_by: ["alertname", "severity"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    - receiver: snowpanel-critical
      matchers:
        - severity="critical"

receivers:
  - name: snowpanel-null

  - name: snowpanel-critical
    # Baseline ships with a no-op receiver to keep startup predictable.
    # Configure your own channel here (webhook/email/slack/wechat/etc).
    #
    # Example:
    # webhook_configs:
    #   - url: "https://example.com/alert-webhook"
    #     send_resolved: true

inhibit_rules:
  - source_matchers:
      - severity="critical"
    target_matchers:
      - severity="warning"
    equal: ["alertname"]
