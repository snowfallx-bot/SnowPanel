global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: snowpanel-backend
    metrics_path: /metrics
    static_configs:
      - targets:
          - backend:8080

  - job_name: snowpanel-core-agent-compose
    metrics_path: /metrics
    static_configs:
      - targets:
          - core-agent:9108

  - job_name: snowpanel-core-agent-host
    metrics_path: /metrics
    static_configs:
      - targets:
          - host.docker.internal:9108
