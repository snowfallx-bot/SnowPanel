groups:
  - name: snowpanel-slo-recordings
    rules:
      - record: snowpanel:backend_http_total:rate5m
        expr: sum(rate(snowpanel_http_requests_total{route!="/metrics"}[5m]))

      - record: snowpanel:backend_http_5xx:rate5m
        expr: sum(rate(snowpanel_http_requests_total{route!="/metrics",status=~"5.."}[5m]))

      - record: snowpanel:backend_http_availability:ratio5m
        expr: 1 - (snowpanel:backend_http_5xx:rate5m / clamp_min(snowpanel:backend_http_total:rate5m, 0.001))

      - record: snowpanel:backend_http_total:rate30m
        expr: sum(rate(snowpanel_http_requests_total{route!="/metrics"}[30m]))

      - record: snowpanel:backend_http_5xx:rate30m
        expr: sum(rate(snowpanel_http_requests_total{route!="/metrics",status=~"5.."}[30m]))

      - record: snowpanel:backend_http_availability:ratio30m
        expr: 1 - (snowpanel:backend_http_5xx:rate30m / clamp_min(snowpanel:backend_http_total:rate30m, 0.001))

      - record: snowpanel:core_agent_grpc_error_ratio:ratio5m
        expr: sum(rate(snowpanel_core_agent_grpc_requests_total{outcome="error"}[5m])) / clamp_min(sum(rate(snowpanel_core_agent_grpc_requests_total[5m])), 0.001)

  - name: snowpanel-health
    rules:
      - alert: SnowPanelBackendDown
        expr: up{job="snowpanel-backend"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "SnowPanel backend is down"
          description: "Prometheus cannot scrape backend /metrics for 2 minutes."

      - alert: SnowPanelCoreAgentMetricsDown
        expr: sum(up{job=~"snowpanel-core-agent-compose|snowpanel-core-agent-host"}) == 0
        for: 3m
        labels:
          severity: critical
        annotations:
          summary: "SnowPanel core-agent metrics endpoint is down"
          description: "Neither compose-mode nor host-mode core-agent metrics endpoint is reachable."

  - name: snowpanel-latency
    rules:
      - alert: SnowPanelBackendP95LatencyHigh
        expr: histogram_quantile(0.95, sum(rate(snowpanel_http_request_duration_seconds_bucket{route!="unmatched"}[5m])) by (le)) > 1.5
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "SnowPanel backend p95 latency is high"
          description: "Backend p95 request latency has been above 1.5s for 10 minutes."

      - alert: SnowPanelCoreAgentP95LatencyHigh
        expr: histogram_quantile(0.95, sum(rate(snowpanel_core_agent_grpc_request_duration_seconds_bucket[5m])) by (le)) > 1
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "SnowPanel core-agent gRPC p95 latency is high"
          description: "Core-agent gRPC p95 latency has been above 1s for 10 minutes."

      - alert: SnowPanelBackendP95LatencyCritical
        expr: histogram_quantile(0.95, sum(rate(snowpanel_http_request_duration_seconds_bucket{route!="unmatched"}[5m])) by (le)) > 3
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: "SnowPanel backend p95 latency is critically high"
          description: "Backend p95 request latency has been above 3s for 10 minutes."

      - alert: SnowPanelCoreAgentP95LatencyCritical
        expr: histogram_quantile(0.95, sum(rate(snowpanel_core_agent_grpc_request_duration_seconds_bucket[5m])) by (le)) > 2
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: "SnowPanel core-agent gRPC p95 latency is critically high"
          description: "Core-agent gRPC p95 latency has been above 2s for 10 minutes."

  - name: snowpanel-error-rate
    rules:
      - alert: SnowPanelBackendAgentTransportErrorsHigh
        expr: sum(rate(snowpanel_agent_requests_total{outcome="error",transport="true"}[5m])) > 0.1
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Backend to core-agent transport errors are elevated"
          description: "Backend reports sustained transport-level core-agent errors (>0.1 req/s) for 10 minutes."

      - alert: SnowPanelCoreAgentGrpcErrorRateHigh
        expr: snowpanel:core_agent_grpc_error_ratio:ratio5m > 0.02
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Core-agent gRPC error rate is high"
          description: "Core-agent gRPC error ratio has exceeded 2% for 10 minutes."

      - alert: SnowPanelCoreAgentGrpcErrorRateCritical
        expr: snowpanel:core_agent_grpc_error_ratio:ratio5m > 0.05
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: "Core-agent gRPC error rate is critically high"
          description: "Core-agent gRPC error ratio has exceeded 5% for 10 minutes."

      - alert: SnowPanelCoreAgentInFlightHigh
        expr: max(snowpanel_core_agent_grpc_requests_in_flight) > 50
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Core-agent in-flight requests are high"
          description: "Core-agent concurrent in-flight gRPC requests exceeded 50 for 10 minutes."

  - name: snowpanel-slo
    rules:
      - alert: SnowPanelBackendAvailabilityBurnRateWarning
        expr: (1 - snowpanel:backend_http_availability:ratio5m) > 0.003 and (1 - snowpanel:backend_http_availability:ratio30m) > 0.002
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "SnowPanel backend availability burn rate is elevated"
          description: "Backend error budget burn is high across 5m/30m windows (5m error rate >0.3%, 30m error rate >0.2%) for 10 minutes."

      - alert: SnowPanelBackendAvailabilityBurnRateCritical
        expr: (1 - snowpanel:backend_http_availability:ratio5m) > 0.01 and (1 - snowpanel:backend_http_availability:ratio30m) > 0.005
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "SnowPanel backend availability burn rate is critical"
          description: "Backend error budget burn is critical across 5m/30m windows (5m error rate >1%, 30m error rate >0.5%) for 5 minutes."

      - alert: SnowPanelBackendAvailabilitySLOWarning
        expr: snowpanel:backend_http_availability:ratio5m < 0.995
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "SnowPanel backend availability SLO is degrading"
          description: "Backend 5xx-based availability has been below 99.5% for 15 minutes."

      - alert: SnowPanelBackendAvailabilitySLOCritical
        expr: snowpanel:backend_http_availability:ratio5m < 0.98
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: "SnowPanel backend availability SLO is critically low"
          description: "Backend 5xx-based availability has been below 98% for 10 minutes."
